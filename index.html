<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rose Garden For My Bestie</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #ff4f87, #ff7aa2);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .container {
      text-align: center;
      max-width: 420px;
      width: 100%;
      padding: 20px;
    }

    h1 {
      margin-bottom: 5px;
      font-size: 32px;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 15px;
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(10px);
      overflow: hidden;
      min-height: 380px;
    }

    .puppy {
      width: 170px;
      margin: 30px auto;
      display: block;
    }

 .rose {
  position: absolute;
  font-size: 42px;        /* 🔥 Bigger roses */
  cursor: pointer;
  animation: float 4s ease-in-out infinite;
  user-select: none;
  transition: transform 0.2s ease, filter 0.2s ease;
}

.rose:hover {
  transform: scale(1.2); /* Slight zoom on hover */
  filter: drop-shadow(0 6px 10px rgba(0,0,0,0.3));
}


    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0); }
    }

    .tip {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.25);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
    }

    /* Overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .message-box {
      background: linear-gradient(180deg, #ff5f9e, #ff85b5);
      padding: 30px;
      border-radius: 20px;
      width: 85%;
      max-width: 350px;
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .message-box h2 {
      margin-top: 0;
      font-size: 22px;
    }

    .message-box p {
      font-size: 15px;
      line-height: 1.6;
    }

    .close {
      margin-top: 20px;
      background: #fff;
      color: #ff4f87;
      border: none;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
    }

    /* Loading */
    .loading {
      font-size: 16px;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Rose Garden For My Bestiee</h1>
  <div class="subtitle">Tap a floating rose to reveal its secret… 🌹</div>

  <div class="card">

    <!-- Puppy Image -->
    <img src="puppy_icon.png" class="puppy" alt="Puppy with Rose">

    <!-- Roses -->
    <span class="rose" style="top:20px; left:30px">🌹</span>
    <span class="rose" style="top:60px; right:40px">🌹</span>
    <span class="rose" style="top:150px; left:10px">🌹</span>
    <span class="rose" style="top:180px; right:20px">🌹</span>
    <span class="rose" style="top:260px; left:60px">🌹</span>
    <span class="rose" style="top:240px; right:80px">🌹</span>

    <div class="tip">💡 Tip: Pick any rose, each has a unique charm!</div>
  </div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="message-box" id="messageBox">
    <div class="loading" id="loading">Picking something special for <b>Aishwarya Bestie</b>… 🌹</div>
  </div>
</div>

<script>
  const roses = document.querySelectorAll(".rose");
  const overlay = document.getElementById("overlay");
  const messageBox = document.getElementById("messageBox");
  const loading = document.getElementById("loading");

  const messages = [
    "You’re not just a special friend today, you’re special every single day 🌹💖",
    "This rose carries all the love of our friendship my heart couldn’t say out loud ❤️",
    "Every time you smile, my world blooms a little more 🌸",
    "If I had to choose again, I’d still choose you always, but this time as a friend (so that I won't loose you again) 💕",
    "Some roses fade, but my feelings for you never will 🌹",
    "Just like this rose, our frienship brings colour, fragnance and happiness to my life ✨"
  ];

  roses.forEach((rose) => {
    rose.addEventListener("click", () => {
      overlay.style.display = "flex";
      loading.style.display = "block";
      messageBox.innerHTML = loading.outerHTML;

      setTimeout(() => {
        const randomMessage = messages[Math.floor(Math.random() * messages.length)];
        messageBox.innerHTML = `
          <h2>🌹 Happy Rose Day</h2>
          <p>${randomMessage}</p>
          <button class="close" onclick="closeOverlay()">Close</button>
        `;
      }, 1500);
    });
  });

  function closeOverlay() {
    overlay.style.display = "none";
  }
</script>

</body>
</html>
